version: '3'

services:
  api:
    build: .
    ports:
      - "8000:8000"

  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5000:5000"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"